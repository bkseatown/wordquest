<style>
  /* ── Class Mode (projector) ─────────────────────────── */
  #cg-class-mode-btn {
    position: fixed;
    bottom: 18px;
    right: 18px;
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 16px;
    border-radius: 999px;
    border: 1px solid rgba(0,0,0,0.14);
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    color: #1a1f3d;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    transition: background 0.14s ease, box-shadow 0.14s ease;
  }
  #cg-class-mode-btn:hover {
    background: rgba(255,255,255,1);
    box-shadow: 0 6px 22px rgba(0,0,0,0.18);
  }
  body.class-mode #cg-class-mode-btn {
    background: #1a1f3d;
    color: #fff;
    border-color: transparent;
  }
  /* Scale up game content in class mode */
  body.class-mode { font-size: 1.2rem; }
  body.class-mode .cg-shell,
  body.class-mode main.cg-shell { max-width: none; padding: 0; }
  body.class-mode #cg-shell { font-size: 1.2rem; }
  body.class-mode .cg-game-card,
  body.class-mode .cg-prompt,
  body.class-mode .cg-question { font-size: 1.4rem !important; }
  body.class-mode .cg-choice,
  body.class-mode .cg-option { font-size: 1.25rem !important; min-height: 56px !important; }
  body.class-mode .cg-score-bar,
  body.class-mode .cg-meta { display: none !important; }

  /* ── No-scroll layout fixes ─────────────────────────── */

  /* Allow page scroll so content is never trapped on short screens or zoomed layouts */
  html, body { min-height: 100%; overflow-x: hidden; overflow-y: auto; }
  main.cg-shell { min-height: 100dvh; overflow: visible; padding: 0; max-width: none; }
  #cg-shell { min-height: 100dvh; overflow: visible; }


  /* Brandbar: compact */
  .cg-brandbar { margin-bottom: 10px; padding: 12px 18px 0; }
  .cg-brand-mark { width: 40px; height: 40px; border-radius: 12px; }
  .cg-brand-copy h1 { font-size: 22px; }
  .cg-brand-copy p  { display: none; }   /* hide subhead to save space */


  /* Compact game cards — name + one-liner only */
  .cg-game-card {
    padding: 12px 14px;
    gap: 6px;
  }
  .cg-game-card h3    { font-size: 14px; margin: 4px 0 2px; }
  .cg-game-card p     { font-size: 12px; margin: 0; line-height: 1.4; }
  .cg-game-card-head  { margin-bottom: 2px; }
  .cg-game-icon       { width: 28px; height: 28px; border-radius: 8px; }
  /* Hide tag chips on game cards */
  .cg-game-card .cg-inline-row { display: none; }


  /* Focus panel: more breathing room */
  .cg-focus-panel { gap: 14px; }
  .cg-stage-board  { gap: 14px; }

  /* Make the answer input the hero — bigger, more prominent */
  .cg-input {
    font-size: 20px !important;
    padding: 14px 18px !important;
    font-weight: 700 !important;
    letter-spacing: 0.06em !important;
  }

  /* Game kicker labels: soften — they're supplementary */
  .cg-kicker {
    font-size: 9px;
    opacity: 0.55;
    letter-spacing: 0.12em;
  }

  body[data-shell-view="gallery"] #cg-class-mode-btn,
  body[data-shell-view="gallery"] #cg-theme-picker {
    display: none !important;
  }

  body[data-shell-view="gallery"] .cg-shell {
    padding: 0;
  }
</style>
<body class="game-platform-page">
  <!-- FOUC prevention: apply saved theme before first paint -->
  <script>(function(){var t="";try{t=localStorage.getItem("cs.game.theme")||"";}catch(e){}if(t)document.body.setAttribute("data-game-theme",t);})();</script>
  <main class="cg-shell">
    <div id="cg-shell"></div>
    <div id="cg-live-region" aria-live="polite" aria-atomic="true" class="cg-hidden"></div>
  </main>

  <button id="cg-class-mode-btn" type="button" aria-pressed="false" title="Toggle projector-friendly class mode">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
    Class Mode
  </button>

  <!-- Theme picker -->
  <div id="cg-theme-picker" aria-label="Choose game theme" role="group">
    <button class="cg-theme-swatch" data-theme=""        title="Cornerstone Navy (default)" aria-pressed="true"  style="background:linear-gradient(135deg,#1a2238,#69be28)"></button>
    <button class="cg-theme-swatch" data-theme="dark"    title="Dark Quest"   aria-pressed="false" style="background:linear-gradient(135deg,#1a1f3d,#d97332)"></button>
    <button class="cg-theme-swatch" data-theme="ocean"   title="Ocean"        aria-pressed="false" style="background:linear-gradient(135deg,#0c2a3f,#06b6d4)"></button>
    <button class="cg-theme-swatch" data-theme="sunset"  title="Sunset"       aria-pressed="false" style="background:linear-gradient(135deg,#2d1b3d,#f472b6)"></button>
    <button class="cg-theme-swatch" data-theme="forest"  title="Forest"       aria-pressed="false" style="background:linear-gradient(135deg,#0d2318,#4ade80)"></button>
    <button class="cg-theme-swatch" data-theme="classic" title="Classic"      aria-pressed="false" style="background:linear-gradient(135deg,#efe8dc,#d98038)"></button>
  </div>

  <style>
    #cg-theme-picker {
      position: fixed;
      bottom: 18px;
      right: 142px;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .cg-theme-swatch {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      padding: 0;
    }
    .cg-theme-swatch:hover {
      transform: scale(1.18);
    }
    .cg-theme-swatch[aria-pressed="true"] {
      border-color: #fff;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.5), 0 2px 8px rgba(0,0,0,0.4);
      transform: scale(1.1);
    }
  </style>

  <script>
    (function() {
      var btn = document.getElementById("cg-class-mode-btn");
      if (!btn) return;
      btn.addEventListener("click", function() {
        var active = document.body.classList.toggle("class-mode");
        btn.setAttribute("aria-pressed", active ? "true" : "false");
        btn.childNodes[btn.childNodes.length - 1].textContent = active ? " Exit Class Mode" : " Class Mode";
      });
    })();

    // Scroll active game into view when a game card is clicked in play mode
    (function() {
      document.addEventListener("click", function(e) {
        var card = e.target.closest && e.target.closest("[data-game-id]");
        if (!card) return;
        if (document.body.getAttribute("data-shell-view") === "gallery") return;
        setTimeout(function() {
          var main = document.querySelector(".cg-main-card") || document.querySelector(".cg-stage-shell");
          if (main) main.scrollIntoView({ behavior: "smooth", block: "start" });
        }, 80);
      });
    })();

    // Theme switcher
    (function() {
      var STORAGE_KEY = "cs.game.theme";
      var swatches = document.querySelectorAll(".cg-theme-swatch");
      function applyTheme(theme) {
        if (theme) {
          document.body.setAttribute("data-game-theme", theme);
        } else {
          document.body.removeAttribute("data-game-theme"); /* Cornerstone Navy: no attribute */
        }
        try { localStorage.setItem(STORAGE_KEY, theme); } catch(e) {}
        swatches.forEach(function(s) {
          s.setAttribute("aria-pressed", s.getAttribute("data-theme") === theme ? "true" : "false");
        });
      }
      // Restore saved theme — default is "" (Cornerstone Navy)
      var saved = "";
      try { saved = localStorage.getItem(STORAGE_KEY) || ""; } catch(e) { saved = ""; }
      applyTheme(saved);
      swatches.forEach(function(s) {
        s.addEventListener("click", function() { applyTheme(s.getAttribute("data-theme")); });
      });
    })();
  </script>
